<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 DHT22 温湿度监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --cyan: #00f0ff;
    --amber: #ff9e00;
    --green: #3fb950;
    --yellow: #e6c85c;
    --orange: #ff9e00;
    --red: #ff4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px; background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); margin-bottom: 20px;
    background: linear-gradient(135deg, #161b22 0%, #1c2333 100%);
  }
  .header h1 {
    font-size: 20px; font-weight: 600;
    background: linear-gradient(90deg, var(--cyan), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .status {
    font-size: 13px; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    background: var(--green); box-shadow: 0 0 6px var(--green);
  }
  .status-dot.stale { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .status-dot.delayed { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .latest-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .latest-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; text-align: center;
  }
  .latest-card .label {
    font-size: 13px; color: var(--text-dim); margin-bottom: 6px;
  }
  .latest-card .value {
    font-size: 32px; font-weight: 700;
  }
  .latest-card .value.temp { transition: color .5s ease; }
  .latest-card .value.humidity { color: var(--cyan); }
  .latest-card .value.thi { color: var(--amber); }
  .comfort-badge {
    display: inline-block;
    font-size: 13px; padding: 2px 10px; border-radius: 20px;
    margin-top: 4px; font-weight: 500;
  }
  .comfort-cold { background: #1a3a5c; color: #66ccff; }
  .comfort-cool { background: #1a3a3a; color: #5cd6b3; }
  .comfort-good { background: #1a3a1a; color: #3fb950; }
  .comfort-warm { background: #3a3a1a; color: #e6c85c; }
  .comfort-hot  { background: #3a1a1a; color: #ff9e00; }
  .comfort-extreme { background: #4a1010; color: #ff4444; }
  .latest-card .unit {
    font-size: 16px; color: var(--text-dim); font-weight: 400;
  }
  .latest-card .updated {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
  }

  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .stats-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
  }
  .stats-card h3 {
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 12px;
  }
  .stats-card.temp h3 { color: #d8b46a; }
  .stats-card.humidity h3 { color: var(--cyan); }
  .stats-card.thi h3 { color: var(--amber); }
  .stats-list {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 14px;
  }
  .stat-item {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 10px; padding: 10px 12px;
  }
  .stat-name {
    font-size: 12px; color: var(--text-dim); margin-bottom: 6px;
  }
  .stat-value {
    font-size: 20px; font-weight: 700; line-height: 1.1;
  }
  .stat-value small {
    font-size: 12px; color: var(--text-dim); font-weight: 500; margin-left: 4px;
  }
  .stat-value.is-low { color: #7ec8ff; }
  .stat-value.is-high { color: #ff9f7f; }
  .stat-value.is-neutral { color: var(--text); }
  .stat-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 44px; width: 100%; padding: 10px 12px;
    border-radius: 12px; font-size: 14px; line-height: 1.35; font-weight: 700;
    text-align: center; border: 1px solid transparent;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 24px rgba(0,0,0,0.18);
  }
  .stat-badge.comfort-cold { background: linear-gradient(135deg, rgba(26,58,92,0.95), rgba(17,38,60,0.95)); border-color: rgba(102,204,255,0.35); color: #8ad8ff; }
  .stat-badge.comfort-cool { background: linear-gradient(135deg, rgba(26,58,58,0.95), rgba(17,45,45,0.95)); border-color: rgba(92,214,179,0.35); color: #7ee8c8; }
  .stat-badge.comfort-good { background: linear-gradient(135deg, rgba(26,58,26,0.95), rgba(18,44,18,0.95)); border-color: rgba(63,185,80,0.35); color: #6fe07f; }
  .stat-badge.comfort-warm { background: linear-gradient(135deg, rgba(58,58,26,0.95), rgba(44,44,18,0.95)); border-color: rgba(230,200,92,0.35); color: #f1d975; }
  .stat-badge.comfort-hot { background: linear-gradient(135deg, rgba(58,26,26,0.95), rgba(44,18,18,0.95)); border-color: rgba(255,158,0,0.35); color: #ffb84d; }
  .stat-badge.comfort-extreme { background: linear-gradient(135deg, rgba(74,16,16,0.98), rgba(54,10,10,0.98)); border-color: rgba(255,68,68,0.4); color: #ff7a7a; }

  .controls {
    display: flex; gap: 10px; align-items: center; margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .controls button {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 6px 16px; border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: all .2s;
  }
  .controls button:hover { border-color: var(--cyan); }
  .controls button.active {
    background: var(--cyan); color: #000; border-color: var(--cyan);
    font-weight: 600;
  }
  .controls button#monthBtn.active {
    background: var(--amber); color: #000; border-color: var(--amber);
    font-weight: 600;
  }
  .controls .dimmed {
    opacity: 0.35;
    pointer-events: none;
  }
  .controls select {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 8px;
    font-size: 13px; cursor: pointer;
  }

  .chart-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 14px;
  }
  .chart-row h3 {
    font-size: 14px; color: var(--text-dim); margin-bottom: 10px;
    font-weight: 500;
  }
  .chart-row canvas { max-height: 220px; }

  .footer {
    text-align: center; font-size: 12px; color: var(--text-dim);
    margin-top: 24px; padding: 10px;
  }

  @media (max-width: 600px) {
    .latest-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
    .stats-list { grid-template-columns: 1fr 1fr; }
    body { padding: 12px; }
    .latest-card .value { font-size: 26px; }
    .stat-value { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🌡 室内温湿度监控</h1>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">加载中...</span>
    <span style="margin-left:12px" id="dataCount"></span>
  </div>
</div>

<div class="latest-grid" id="latestGrid">
  <div class="latest-card">
    <div class="label">🌡 温度</div>
    <div class="value temp" id="latestTemp">-- <span class="unit">°C</span></div>
    <div class="updated" id="tempTime"></div>
  </div>
  <div class="latest-card">
    <div class="label">💧 湿度</div>
    <div class="value humidity" id="latestHum">-- <span class="unit">%</span></div>
    <div class="updated" id="humTime"></div>
  </div>
  <div class="latest-card">
    <div class="label">🌡 温湿指数 (THI)</div>
    <div class="value thi" id="latestThi">--</div>
    <div class="comfort-badge" id="comfortBadge">--</div>
    <div class="updated" id="thiTime"></div>
  </div>
</div>

<div class="stats-grid" id="statsGrid">
  <div class="stats-card temp">
    <h3>🌡 温度摘要</h3>
    <div class="stats-list">
      <div class="stat-item"><div class="stat-name">最低</div><div class="stat-value" id="tempMin">--</div></div>
      <div class="stat-item"><div class="stat-name">最高</div><div class="stat-value" id="tempMax">--</div></div>
      <div class="stat-item"><div class="stat-name">平均</div><div class="stat-value" id="tempAvg">--</div></div>
      <div class="stat-item"><div class="stat-name">波动</div><div class="stat-value" id="tempRange">--</div></div>
    </div>
  </div>
  <div class="stats-card humidity">
    <h3>💧 湿度摘要</h3>
    <div class="stats-list">
      <div class="stat-item"><div class="stat-name">最低</div><div class="stat-value" id="humMin">--</div></div>
      <div class="stat-item"><div class="stat-name">最高</div><div class="stat-value" id="humMax">--</div></div>
      <div class="stat-item"><div class="stat-name">平均</div><div class="stat-value" id="humAvg">--</div></div>
      <div class="stat-item"><div class="stat-name">波动</div><div class="stat-value" id="humRange">--</div></div>
    </div>
  </div>
  <div class="stats-card thi">
    <h3>🌡 THI 摘要</h3>
    <div class="stats-list">
      <div class="stat-item"><div class="stat-name">最低</div><div class="stat-value" id="thiMin">--</div></div>
      <div class="stat-item"><div class="stat-name">最高</div><div class="stat-value" id="thiMax">--</div></div>
      <div class="stat-item"><div class="stat-name">平均</div><div class="stat-value" id="thiAvg">--</div></div>
      <div class="stat-item"><div class="stat-name">波动</div><div class="stat-value" id="thiRange">--</div></div>
    </div>
  </div>
</div>

<div class="controls">
  <select id="deviceSelect" onchange="switchDevice()">
    <option value="%">所有设备</option>
  </select>
  <button onclick="setHours(6)" data-h="6">6 小时</button>
  <button onclick="setHours(24)" data-h="24" class="active">24 小时</button>
  <button onclick="setHours(72)" data-h="72">3 天</button>
  <button onclick="setHours(168)" data-h="168">7 天</button>
  <button onclick="setHours(720)" data-h="720">30 天</button>
  <span style="color:var(--text-dim);margin:0 6px;font-size:13px">|</span>
  <select id="yearSelect" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:13px"></select>
  <select id="monthSelect" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:13px">
    <option value="1">1 月</option><option value="2">2 月</option><option value="3">3 月</option>
    <option value="4">4 月</option><option value="5">5 月</option><option value="6">6 月</option>
    <option value="7">7 月</option><option value="8">8 月</option><option value="9">9 月</option>
    <option value="10">10 月</option><option value="11">11 月</option><option value="12">12 月</option>
  </select>
  <button onclick="loadMonth()" id="monthBtn" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px">📅 查看</button>
</div>

<div class="chart-row">
  <h3>🌡 温度曲线</h3>
  <canvas id="tempChart"></canvas>
</div>
<div class="chart-row">
  <h3>💧 湿度曲线</h3>
  <canvas id="humChart"></canvas>
</div>
<div class="chart-row">
  <h3>🌡 温湿指数 (THI)</h3>
  <canvas id="thiChart"></canvas>
</div>

<div class="footer">
  ESP32 + DHT22 · 数据每 60 秒上报 · 自动刷新
</div>

<script>
let tempChart, humChart, thiChart;
let currentHours = 24;
let currentDevice = '%';
let allData = [];
let lastDataTimestamp = null;
const GAP_MULTIPLIER = 2.5;
const MIN_GAP_MS = 3 * 60 * 1000;
const STATUS_STALE_MS = 2 * 60 * 1000;
const STATUS_DELAYED_MS = 10 * 60 * 1000;
const STATUS_OFFLINE_MS = 30 * 60 * 1000;
const colors = {
  hum:  { bg: 'rgba(0,240,255,0.1)', border: '#00f0ff', point: '#00f0ff' },
};

// 温度 → 连续渐变（线性插值：深蓝 → 蓝 → 青 → 黄 → 橙 → 红）
const tempStops = [
  { t: -10, r: 0x00, g: 0x33, b: 0xcc },
  { t:   0, r: 0x00, g: 0x66, b: 0xff },
  { t:  10, r: 0x33, g: 0xaa, b: 0xff },
  { t:  18, r: 0x66, g: 0xcc, b: 0xcc },
  { t:  24, r: 0xcc, g: 0xcc, b: 0x55 },
  { t:  30, r: 0xff, g: 0x99, b: 0x00 },
  { t:  36, r: 0xff, g: 0x44, b: 0x22 },
  { t:  45, r: 0xff, g: 0x11, b: 0x11 },
];
function lerpColor(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t),
  };
}
function tempColor(temp) {
  if (temp <= tempStops[0].t) {
    const c = tempStops[0];
    return '#' + [c.r,c.g,c.b].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  if (temp >= tempStops[tempStops.length-1].t) {
    const c = tempStops[tempStops.length-1];
    return '#' + [c.r,c.g,c.b].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  for (let i = 0; i < tempStops.length - 1; i++) {
    if (temp >= tempStops[i].t && temp < tempStops[i+1].t) {
      const t = (temp - tempStops[i].t) / (tempStops[i+1].t - tempStops[i].t);
      const c = lerpColor(tempStops[i], tempStops[i+1], t);
      return '#' + [c.r,c.g,c.b].map(v => v.toString(16).padStart(2,'0')).join('');
    }
  }
  return '#ff0000';
}

function tempColorRgba(temp, alpha) {
  const c = tempColor(temp);
  const r = parseInt(c.slice(1,3), 16);
  const g = parseInt(c.slice(3,5), 16);
  const b = parseInt(c.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// 基于 y 轴像素位置构建连续的 Canvas 渐变（替代逐段纯色），
// 这样线条颜色是真正沿曲线平滑过渡，而不是"一段一个色"跳变。
// 每次渲染时 Chart.js 会重新调用这个函数（scriptable option），
// 所以缩放、切换时间范围导致的 y 轴范围变化也会自动适配。
//
// 两个需要防护的坑：
// 1) Chart.js 在首次布局阶段会先用一个高度为 0 的临时 chartArea 调用
//    本函数（容器尚未完成实际测量），(pixel-top)/(bottom-top) 会算出
//    NaN，addColorStop(NaN,...) 抛异常会导致整个 Chart 构造失败、
//    曲线完全不渲染——下面显式校验 height/yMin/yMax 是否为有限数。
// 2) y 轴默认数值越大、像素位置越靠上（offset 越小），如果直接按
//    "温度数值升序"去处理偏移量，方向是反的；必须先算出每个断点的
//    真实 offset，再按 offset 升序排列，否则渐变会被错误地挤压塌缩
//    成同一种颜色，看起来就跟没渐变一样。
function buildTempGradient(chartCtx, withAlpha) {
  const fallback = withAlpha ? 'transparent' : '#888';
  try {
    const { chart } = chartCtx;
    const { ctx, chartArea, scales } = chart;
    if (!chartArea) return fallback; // 布局尚未开始

    const height = chartArea.bottom - chartArea.top;
    if (!Number.isFinite(height) || height <= 0) return fallback; // 布局中的零高度临时帧

    const yScale = scales && scales.y;
    if (!yScale) return fallback;
    const yMin = yScale.min;
    const yMax = yScale.max;
    if (!Number.isFinite(yMin) || !Number.isFinite(yMax)) return fallback;

    const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);

    // 收集断点温度值：y 轴上下边界 + 落在范围内的 tempStops
    const values = [yMin, yMax];
    tempStops.forEach(s => {
      if (s.t > yMin && s.t < yMax) values.push(s.t);
    });

    // 先把每个温度值换算成真实的 offset，再按 offset 排序，
    // 而不是按温度值排序——避免坐标方向反转导致渐变塌缩。
    const points = values
      .map(val => {
        const pixel = yScale.getPixelForValue(val);
        const offset = Math.min(1, Math.max(0, (pixel - chartArea.top) / height));
        return { offset, val };
      })
      .filter(p => Number.isFinite(p.offset));

    points.sort((a, b) => a.offset - b.offset);

    let lastOffset = -1;
    points.forEach(p => {
      let offset = p.offset;
      if (offset <= lastOffset) offset = Math.min(1, lastOffset + 0.0001); // 避免重复偏移
      lastOffset = offset;
      const color = withAlpha ? tempColorRgba(p.val, 0.12) : tempColor(p.val);
      gradient.addColorStop(offset, color);
    });

    return gradient;
  } catch (e) {
    // 任何意外情况都不能让整张图表渲染失败，退回到纯色兜底
    return fallback;
  }
}


// 温湿指数 (THI) = 0.8 × T + (RH/100) × (T - 14.4) + 46.4
function computeTHI(temp, humidity) {
  return 0.8 * temp + (humidity / 100) * (temp - 14.4) + 46.4;
}

// THI 体感分级：统一使用家用仪表盘语气，避免把舒适度和风险告警混在一起
// <45：冷　45-50：清凉　51-58：偏凉　59-70：舒适
// 71-76：偏暖　77-80：闷热　81-84：很闷热　85+：极闷热
function getComfortLevel(thi) {
  if (thi < 45)  return { text: '🥶 冷', cls: 'comfort-cold', color: '#4da3ff' };
  if (thi < 51)  return { text: '❄️ 清凉', cls: 'comfort-cold', color: '#66ccff' };
  if (thi < 59)  return { text: '🍃 偏凉', cls: 'comfort-cool', color: '#5cd6b3' };
  if (thi < 71)  return { text: '😊 舒适', cls: 'comfort-good', color: '#3fb950' };
  if (thi < 77)  return { text: '🌤️ 偏暖', cls: 'comfort-warm', color: '#e6c85c' };
  if (thi < 81)  return { text: '🔥 闷热', cls: 'comfort-hot', color: '#ff9e00' };
  if (thi < 85)  return { text: '🔴 很闷热', cls: 'comfort-extreme', color: '#ff7a7a' };
  return { text: '🚨 极闷热', cls: 'comfort-extreme', color: '#ff4444' };
}

function formatTime(isoStr) {
  const t = new Date(isoStr);
  // 月视图用更紧凑的格式
  if (currentMode === 'month') {
    return t.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit' });
  }
  return t.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function formatRelativeTime(isoStr) {
  if (!isoStr) return '暂无数据';
  const diffMs = Date.now() - new Date(isoStr).getTime();
  if (!Number.isFinite(diffMs) || diffMs < 0) return '刚刚更新';

  const seconds = Math.floor(diffMs / 1000);
  if (seconds < 10) return '刚刚更新';
  if (seconds < 60) return `${seconds} 秒前更新`;

  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes} 分钟前更新`;

  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours} 小时前更新`;

  const days = Math.floor(hours / 24);
  return `${days} 天前更新`;
}

function getStatusLevel(isoStr) {
  if (!isoStr) {
    return { text: '暂无数据', dotClass: 'status-dot offline', level: 'offline' };
  }

  const diffMs = Date.now() - new Date(isoStr).getTime();
  if (!Number.isFinite(diffMs) || diffMs < 0) {
    return { text: '刚刚更新', dotClass: 'status-dot', level: 'live' };
  }

  if (diffMs >= STATUS_OFFLINE_MS) {
    return { text: `离线 · ${formatRelativeTime(isoStr)}`, dotClass: 'status-dot offline', level: 'offline' };
  }
  if (diffMs >= STATUS_DELAYED_MS) {
    return { text: `延迟较高 · ${formatRelativeTime(isoStr)}`, dotClass: 'status-dot delayed', level: 'delayed' };
  }
  if (diffMs >= STATUS_STALE_MS) {
    return { text: `轻微延迟 · ${formatRelativeTime(isoStr)}`, dotClass: 'status-dot stale', level: 'stale' };
  }

  return { text: formatRelativeTime(isoStr), dotClass: 'status-dot', level: 'live' };
}

function updateStatusFromLastData() {
  const statusEl = document.getElementById('statusText');
  const dotEl = document.getElementById('statusDot');
  const status = getStatusLevel(lastDataTimestamp);
  statusEl.textContent = status.text;
  dotEl.className = status.dotClass;
}

let currentMode = 'relative'; // 'relative' | 'month'

function setHours(h) {
  currentMode = 'relative';
  currentHours = h;
  document.querySelectorAll('.controls button').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.h) === h);
  });
  document.getElementById('monthBtn').classList.remove('active');
  // 切换到相对时间：年份月份下拉变虚，但 📅 按钮保持可点
  document.getElementById('yearSelect').classList.add('dimmed');
  document.getElementById('monthSelect').classList.add('dimmed');
  // 时间按钮恢复
  document.querySelectorAll('.controls button[data-h]').forEach(b => b.classList.remove('dimmed'));
  fetchData();
}

function pad2(n) { return n.toString().padStart(2, '0'); }

function getMonthRange(year, month) {
  const from = `${year}-${pad2(month)}-01T00:00:00`;
  const to = month === 12 ? `${year+1}-01-01T00:00:00` : `${year}-${pad2(month+1)}-01T00:00:00`;
  return { from, to };
}

async function loadMonth() {
  const year = parseInt(document.getElementById('yearSelect').value);
  const month = parseInt(document.getElementById('monthSelect').value);
  const { from, to } = getMonthRange(year, month);

  currentMode = 'month';
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('monthBtn').classList.add('active');
  // 切换到月份：年份月份下拉恢复，时间按钮保持可点
  document.getElementById('yearSelect').classList.remove('dimmed');
  document.getElementById('monthSelect').classList.remove('dimmed');

  const url = `/api/data?device=${encodeURIComponent(currentDevice)}&from=${from}&to=${to}`;
  try {
    const r = await fetch(url);
    const j = await r.json();
    allData = j.data || [];
    lastDataTimestamp = allData.length ? allData[allData.length - 1].time : null;
    updateStatusFromLastData();
    const label = `${year} 年 ${month} 月`;
    document.getElementById('dataCount').textContent = `${label} · ${allData.length} 条数据`;
    updateLatest(allData);
    updateStats(allData);
    renderCharts(allData);
  } catch {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = '接口离线';
  }
}

function initMonthPicker() {
  const now = new Date();
  const yearSel = document.getElementById('yearSelect');
  // 显示过去 3 年
  for (let y = now.getFullYear(); y >= now.getFullYear() - 3; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = `${y} 年`;
    yearSel.appendChild(opt);
  }
  yearSel.value = now.getFullYear();
  document.getElementById('monthSelect').value = now.getMonth() + 1;
  // 默认相对时间模式，年份月份下拉变虚
  document.getElementById('yearSelect').classList.add('dimmed');
  document.getElementById('monthSelect').classList.add('dimmed');
}

function switchDevice() {
  currentDevice = document.getElementById('deviceSelect').value;
  fetchData();
}

function addGapBreaks(data) {
  if (data.length < 2) return data.slice();

  const timestamps = data
    .map(item => new Date(item.time).getTime())
    .filter(Number.isFinite)
    .sort((a, b) => a - b);

  let expectedInterval = 60 * 1000;
  if (timestamps.length >= 2) {
    const deltas = [];
    for (let i = 1; i < timestamps.length; i++) {
      const delta = timestamps[i] - timestamps[i - 1];
      if (delta > 0) deltas.push(delta);
    }
    if (deltas.length) {
      deltas.sort((a, b) => a - b);
      expectedInterval = deltas[Math.floor(deltas.length / 2)];
    }
  }

  const gapThreshold = Math.max(MIN_GAP_MS, expectedInterval * GAP_MULTIPLIER);
  const result = [data[0]];

  for (let i = 1; i < data.length; i++) {
    const prevTs = new Date(data[i - 1].time).getTime();
    const currTs = new Date(data[i].time).getTime();
    if (Number.isFinite(prevTs) && Number.isFinite(currTs) && currTs - prevTs > gapThreshold) {
      result.push({ time: data[i].time, temp: null, humidity: null, __gap: true });
    }
    result.push(data[i]);
  }

  return result;
}

function updateLatest(data) {
  const tempEl = document.getElementById('latestTemp');
  const humEl = document.getElementById('latestHum');
  const thiEl = document.getElementById('latestThi');
  const badge = document.getElementById('comfortBadge');
  const tempTimeEl = document.getElementById('tempTime');
  const humTimeEl = document.getElementById('humTime');
  const thiTimeEl = document.getElementById('thiTime');

  const resetLatest = () => {
    tempEl.innerHTML = '-- <span class="unit">°C</span>';
    tempEl.style.color = '';
    humEl.innerHTML = '-- <span class="unit">%</span>';
    thiEl.textContent = '--';
    badge.textContent = '--';
    badge.className = 'comfort-badge';
    tempTimeEl.textContent = '';
    humTimeEl.textContent = '';
    thiTimeEl.textContent = '';
  };

  if (!data.length) {
    resetLatest();
    return;
  }

  const validRows = data.filter(item => Number.isFinite(item?.temp) && Number.isFinite(item?.humidity) && item?.time);
  if (!validRows.length) {
    resetLatest();
    return;
  }

  const last = validRows[validRows.length - 1];
  tempEl.innerHTML = last.temp.toFixed(1) + ' <span class="unit">°C</span>';
  tempEl.style.color = tempColor(last.temp);
  humEl.innerHTML = last.humidity.toFixed(1) + ' <span class="unit">%</span>';
  tempTimeEl.textContent = formatTime(last.time);
  humTimeEl.textContent = formatTime(last.time);

  const thi = computeTHI(last.temp, last.humidity);
  const comfort = getComfortLevel(thi);
  thiEl.textContent = thi.toFixed(1);
  badge.textContent = comfort.text;
  badge.className = 'comfort-badge ' + comfort.cls;
  thiTimeEl.textContent = formatTime(last.time);
}

function setStatValue(id, value, unit = '', tone = 'neutral') {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'stat-value';
  if (value === null || value === undefined || Number.isNaN(value)) {
    el.textContent = '--';
    return;
  }
  el.classList.add(`is-${tone}`);
  el.innerHTML = `${value.toFixed(1)}${unit ? ` <small>${unit}</small>` : ''}`;
}

function updateStats(data) {
  const validRows = data.filter(item => Number.isFinite(item?.temp) && Number.isFinite(item?.humidity));
  if (!validRows.length) {
    ['tempMin','tempMax','tempAvg','tempRange','humMin','humMax','humAvg','humRange','thiMin','thiMax','thiAvg','thiRange']
      .forEach(id => setStatValue(id, null));
    return;
  }

  const temps = validRows.map(item => item.temp);
  const humidities = validRows.map(item => item.humidity);
  const thiValues = validRows.map(item => computeTHI(item.temp, item.humidity));

  const min = arr => Math.min(...arr);
  const max = arr => Math.max(...arr);
  const avg = arr => arr.reduce((sum, value) => sum + value, 0) / arr.length;

  setStatValue('tempMin', min(temps), '°C', 'low');
  setStatValue('tempMax', max(temps), '°C', 'high');
  setStatValue('tempAvg', avg(temps), '°C');
  setStatValue('tempRange', max(temps) - min(temps), '°C');

  setStatValue('humMin', min(humidities), '%', 'low');
  setStatValue('humMax', max(humidities), '%', 'high');
  setStatValue('humAvg', avg(humidities), '%');
  setStatValue('humRange', max(humidities) - min(humidities), '%');

  setStatValue('thiMin', min(thiValues), '', 'low');
  setStatValue('thiMax', max(thiValues), '', 'high');
  setStatValue('thiAvg', avg(thiValues));
  setStatValue('thiRange', max(thiValues) - min(thiValues));
}

function buildChart(ctx, label, data, color, unit, isTemp) {
  const chartData = addGapBreaks(data);
  const labels = chartData.map(d => formatTime(d.time));
  const values = chartData.map(d => {
    if (d.__gap) return null;
    if (unit === '%') return d.humidity;
    return d.temp;
  });

  const dataset = isTemp ? {
    label, data: values,
    borderColor: ctx => buildTempGradient(ctx, false),
    backgroundColor: ctx => buildTempGradient(ctx, true),
    pointRadius: 0,
    pointHitRadius: 6,
    borderWidth: 3,
    tension: 0.3,
    fill: true,
  } : {
    label, data: values,
    borderColor: color.border,
    backgroundColor: color.bg,
    pointRadius: 0,
    pointHitRadius: 6,
    borderWidth: 2,
    tension: 0.3,
    fill: true,
  };

  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [dataset],
    },
    options: {
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2333',
          titleColor: '#c9d1d9',
          bodyColor: '#c9d1d9',
          borderColor: '#30363d',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            label: ctx => {
              const val = ctx.parsed.y;
              const u = unit === '%' ? '%' : '°C';
              return `${val.toFixed(1)} ${u}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e', maxTicksLimit: 8, font: { size: 10 } },
          grid: { color: '#30363d' }
        },
        y: {
          ticks: { color: '#8b949e', font: { size: 10 } },
          grid: { color: '#30363d' }
        }
      }
    }
  });
}

function buildTHIChart(ctx, data) {
  const chartData = addGapBreaks(data);
  const labels = chartData.map(d => formatTime(d.time));
  const values = chartData.map(d => d.__gap ? null : computeTHI(d.temp, d.humidity));

  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'THI',
        data: values,
        borderColor: '#888',
        backgroundColor: 'transparent',
        pointRadius: 0,
        pointHitRadius: 6,
        borderWidth: 3,
        tension: 0.3,
        fill: true,
        segment: {
          borderColor: ctx => getComfortLevel(ctx.p1.parsed.y).color,
          backgroundColor: ctx => {
            const c = getComfortLevel(ctx.p1.parsed.y).color;
            const r = parseInt(c.slice(1,3), 16);
            const g = parseInt(c.slice(3,5), 16);
            const b = parseInt(c.slice(5,7), 16);
            return `rgba(${r},${g},${b},0.12)`;
          },
        },
      }],
    },
    options: {
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2333',
          titleColor: '#c9d1d9',
          bodyColor: '#c9d1d9',
          borderColor: '#30363d',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            label: ctx => {
              const thi = ctx.parsed.y;
              const comfort = getComfortLevel(thi);
              return `THI: ${thi.toFixed(1)} · ${comfort.text}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e', maxTicksLimit: 8, font: { size: 10 } },
          grid: { color: '#30363d' }
        },
        y: {
          ticks: { color: '#8b949e', font: { size: 10 } },
          grid: { color: '#30363d' }
        }
      }
    }
  });
}

function renderCharts(data) {
  if (tempChart) tempChart.destroy();
  if (humChart) humChart.destroy();
  if (thiChart) thiChart.destroy();

  tempChart = buildChart(
    document.getElementById('tempChart'), '温度', data, null, '°C', true
  );
  humChart = buildChart(
    document.getElementById('humChart'), '湿度', data, colors.hum, '%', false
  );
  thiChart = buildTHIChart(
    document.getElementById('thiChart'), data
  );
}

async function loadDevices() {
  const r = await fetch('/api/devices');
  const j = await r.json();
  const sel = document.getElementById('deviceSelect');
  j.devices.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

async function fetchData() {
  const url = `/api/data?device=${encodeURIComponent(currentDevice)}&hours=${currentHours}`;
  try {
    const r = await fetch(url);
    const j = await r.json();
    allData = j.data || [];
    lastDataTimestamp = allData.length ? allData[allData.length - 1].time : null;
    updateStatusFromLastData();
    document.getElementById('dataCount').textContent = `${allData.length} 条数据`;
    updateLatest(allData);
    updateStats(allData);
    renderCharts(allData);
  } catch {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = '接口离线';
  }
}

initMonthPicker();
loadDevices();
fetchData();
setInterval(fetchData, 30000);
setInterval(updateStatusFromLastData, 1000);
</script>
